spring.application.name=securebank-api

# Local Default: H2 Database
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:securebank;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false

# H2 Console (for local dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Secret
jwt.secret=${JWT_SECRET:default-local-256-bit-secret-key-that-should-be-changed-in-production}
jwt.expiration=86400000

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
